server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Resolve the "app" service name at request time via Docker's embedded
        # DNS (127.0.0.11). Using a variable for the upstream forces re-resolution
        # so nginx doesn't 502 with a stale IP after the app container is recreated.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_app app:9000;

        fastcgi_pass $upstream_app;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
